<!DOCTYPE html>
<html lang="en">

<head>

<body>
  <a href="https://www.curso-webdev.com/?page=dom-storage">link da aula da apostila </a>

  <br>

  <h1>TÍTULO ORIGINAL</h1>

  <div>
    <div id="container">div 1</div>
    <div><img src="img/images.jpg" alt="foto de gato meio carcumido" title="foto"></div>
    <div>
    <button id="botao">mostrar/esconder</button>
  </div>
  <br>
    <div class="box"></div>
  </div>
  <br>
  <div>
    <ul>
      <li>lista 1</li>
      <li>lista 2</li>
      <li>lista 3</li>
      <li>lista 4</li>
    </ul>
  </div>
  <input id="input-tarefas">
   <button id="form-tarefa">botao legal</button>
   <br>
  <ul id="lista-tarefas"></ul>


  <form id="formTarefa">
  <input id="tarefa" placeholder="Digite uma tarefa" />
  <button>Adicionar</button>
</form>
<ul id="lista"></ul>
<script>
formTarefa.onsubmit = (e) => {
  e.preventDefault();
  const li = document.createElement("li");
  li.textContent = tarefa.value;
  const btn = document.createElement("button");
  btn.textContent = "Excluir";
  btn.onclick = () => li.remove();
  li.appendChild(btn);
  lista.appendChild(li);
  tarefa.value = "";
};
</script>
  <script src="script.js"></script>
</body>

</html>
